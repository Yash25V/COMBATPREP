{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - CombatPrep{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card glass-card border-0 shadow-lg mt-5">
            <div class="card-header bg-transparent border-bottom border-secondary text-center py-4">
                <i class="fa-solid fa-shield-halved fa-3x text-accent mb-3"></i>
                <h3 class="fw-bold mb-0">Secure Login</h3>
                <p class="text-muted small">CombatPrep Operational System</p>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-accent btn-lg fw-bold">Authenticate <i class="fa-solid fa-arrow-right ms-2"></i></button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
